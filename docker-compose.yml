services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stockpilot
      POSTGRES_PASSWORD: stockpilot
      POSTGRES_DB: stockpilot_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpilot -d stockpilot_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.local
    environment:
      - DATABASE_URL=postgresql+asyncpg://stockpilot:stockpilot@postgres:5432/stockpilot_dev
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      - backend
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  pgdata:
